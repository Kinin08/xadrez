<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../toast/toast.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script type="module" src="script.js" defer></script>
</head>

<body>
    <header>
        <a href="../login/index.html" id="sublime">Log in</a>
        <a href="../cadastro/index.html">Sing up</a>
    </header>
    <div class="container">
        <div class="login-box">
            <h2>Log in</h2>
            <form autocomplete="off">
                <div class="input-box">
                    <i class="fa fa-envelope"></i>
                    <input type="email" name="email" placeholder="E-mail" required>
                </div>
                <div class="input-box">
                    <i class="fa fa-lock input-icon"></i>
                    <input id="senha" type="password" name="password" placeholder="Senha" required>
                    <button type="button" class="toggle-password" id="toggleSenha">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn">Log in</button>
            </form>
        </div>
    </div>
</body>

</html>
